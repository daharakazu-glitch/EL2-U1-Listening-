<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictation & Speaking Practice - Unit 1 Listening 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* スクロールバーを隠すスタイル */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* 共通フォント設定 */
    body {
      background-color: #FDFBF7;
      color: #111827;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    }

    /* ディクテーションテキストのフォント設定 */
    .dictation-text {
      font-family: "Times New Roman", Times, serif;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header & Controls -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm font-sans">
    <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
          Dictation Practice
        </h1>
      </div>
      
      <div class="flex flex-wrap items-center gap-3">
         
         <!-- スピード調節コントロール -->
         <div class="flex items-center gap-2 px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-gray-500"><path d="m12 14 4-4"></path><path d="M3.34 19a10 10 0 1 1 17.32 0"></path></svg>
            <label for="speedSelect" class="text-base font-bold text-gray-600">Speed:</label>
            <select id="speedSelect" class="bg-transparent text-base font-bold text-gray-800 outline-none cursor-pointer">
              <option value="0.8">0.8x</option>
              <option value="1.0" selected>1.0x</option>
              <option value="1.2">1.2x</option>
              <option value="1.5">1.5x</option>
            </select>
         </div>

         <!-- 各種ボタン（サイズ統一・文字拡大） -->
         <button id="toggleAnswersBtn" class="flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-200 min-w-[170px]">
            <span id="answersIcon">
              <!-- EyeIcon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </span>
            <span id="answersText">Show Answers</span>
          </button>

         <button id="playAudioBtn" class="flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200 min-w-[150px]">
            <span id="playIconContainer">
              <!-- PlayIcon -->
              <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M8 5v14l11-7z"/></svg>
            </span>
            <span id="playText">Play All</span>
        </button>

        <button id="recordBtn" class="flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 min-w-[150px]">
          <span id="recordIconContainer">
            <!-- MicIcon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
          </span>
          <span id="recordText">Record</span>
        </button>

        <button id="playRecordBtn" class="hidden flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 min-w-[170px]">
          <span id="playRecordIconContainer">
            <!-- PlayIcon -->
            <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M8 5v14l11-7z"/></svg>
          </span>
          <span id="playRecordText">Play My Voice</span>
        </button>
      </div>
    </div>
    
    <!-- Tabs -->
    <div class="max-w-6xl mx-auto px-6 mt-2">
      <div id="tabsContainer" class="flex overflow-x-auto hide-scrollbar gap-8 border-b border-gray-100">
        <!-- Tabs will be rendered here by JS -->
      </div>
    </div>
  </header>

  <!-- Content Area -->
  <main class="max-w-5xl mx-auto px-6 py-12 flex-grow w-full">
    <h2 id="lessonTitle" class="text-3xl font-bold mb-10 text-center font-sans text-gray-800 border-b-2 border-gray-200 pb-4 inline-block mx-auto flex justify-center"></h2>
    
    <div id="dialoguesContainer" class="bg-white p-8 md:p-12 shadow-md border border-gray-200 rounded-xl dictation-text">
      <!-- Dialogues will be rendered here by JS -->
    </div>
  </main>

  <!-- JavaScript -->
  <script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // --- Data ---
    const lessons = [
      {
        id: "l2",
        title: "Listening 2",
        dialogues: [
          { speaker: "R", text: "So, here we are, this is a good spot to hear takahe. Now, the birds are difficult to see because there are a lot of trees. But, they are quite ‘chatty’ so if we listen out there’s a good chance we will hear one." },
          { speaker: "K", text: "I’m sorry . . . chatty?" },
          { speaker: "R", text: "Yeah, meaning they like to talk to each other. To chat." },
          { speaker: "K", text: "Ah! Chat-ty!" },
          { speaker: "R", text: "That’s right. Now, {let} {me} {give} {you} some information about our little friends. The takahe is one of many birds {endemic} {to} New Zealand. This means that they are only found here. The takahe is a flightless bird. They grow up to 50cm tall and the males {weigh} around 2.7kg. (takahe call) Ah! There’s one. Did you hear it?" },
          { speaker: "K+S", text: "Oh yeah. It’s close." },
          { speaker: "R", text: "Yes, I hope you guys get to see one. Takahe are really special. They have a bright red bill and their feathers are beautiful. Dark blue around their head, {a} {kind} {of} peacock blue around their shoulders, and their wings are an emerald green." },
          { speaker: "K+S", text: "Oh! Nice!" },
          { speaker: "S", text: "Is it true they are endangered?" },
          { speaker: "R", text: "Yes, that’s right. Actually, many people thought they were extinct. Then, in 1948, they were rediscovered in a valley in Fiordland. That’s in the South Island. These days, that’s the only area where the takahe live in the wild, in a place called the Murchison Mountains." },
          { speaker: "K", text: "You said people thought they were extinct. Do you know why they {disappeared}?" },
          { speaker: "R", text: "Well, it’s difficult to say for sure, but the biggest reason we think is {because} {of} humans. When more people started coming to New Zealand from Europe, they started to move into the takahe’s habitats. Also, the settlers brought new animals into the country, like cats and dogs. As takahe can’t fly, they don’t stand much chance against a cat!" },
          { speaker: "S", text: "Right! And is there any kind of . . . {conservation} program?" },
          { speaker: "R", text: "Yes! Different groups, like Zealandia, now work together to breed takahe and release them into the wild. After 65 years of work, there are now over 350 birds in the takahe population." },
          { speaker: "K+S", text: "That’s great." },
          { speaker: "R", text: "So, unfortunately, it looks like they are not going to {make} {an} {appearance}. Let’s see who we can find in the shrubland instead, shall we?" }
        ]
      }
    ];

    // --- Speaker Voice Profiles ---
    const speakerProfiles = {
      "R": { gender: "male", pitch: 0.9 },
      "K": { gender: "female", pitch: 1.1 },
      "S": { gender: "female", pitch: 1.3 },
      "K+S": { gender: "female", pitch: 1.0 }
    };

    // --- Icons ---
    const SVGs = {
      playFull: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full"><path d="M8 5v14l11-7z"/></svg>',
      play: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M8 5v14l11-7z"/></svg>',
      pauseFull: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>',
      pause: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>',
      stop: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M6 6h12v12H6z"/></svg>',
      mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>',
      eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>',
      eyeOff: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" x2="22" y1="2" y2="22"></line></svg>'
    };

    // --- State & DOM Elements ---
    let activeTabId = lessons[0].id;
    let showAllAnswers = false;
    let revealedAnswers = new Set();
    
    let playbackSpeed = 1.0;
    
    // playState can be 'idle', 'playing', 'paused'
    let playState = 'idle'; 
    let currentPlayingIndex = -1;
    let resumeIndex = 0; 
    let isPlayingRef = false;
    
    const synth = window.speechSynthesis;
    let voices = [];
    
    // ガベージコレクション回避用の配列
    let keepAliveUtterances = [];

    function populateVoiceList() {
      voices = synth.getVoices();
    }

    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    let isRecording = false;
    let recordUrl = null;
    let isPlayingRecord = false;
    let mediaRecorder = null;
    let recordAudio = null;

    const tabsContainer = document.getElementById('tabsContainer');
    const lessonTitle = document.getElementById('lessonTitle');
    const dialoguesContainer = document.getElementById('dialoguesContainer');
    const speedSelect = document.getElementById('speedSelect');
    
    const toggleAnswersBtn = document.getElementById('toggleAnswersBtn');
    const playAudioBtn = document.getElementById('playAudioBtn');
    const recordBtn = document.getElementById('recordBtn');
    const playRecordBtn = document.getElementById('playRecordBtn');

    // --- Initialization ---
    function init() {
      renderTabs();
      loadLesson(activeTabId);
      setupEventListeners();
    }

    // --- Rendering ---
    function renderTabs() {
      tabsContainer.innerHTML = '';
      lessons.forEach(lesson => {
        const btn = document.createElement('button');
        const isActive = activeTabId === lesson.id;
        
        btn.className = `whitespace-nowrap py-3 font-bold text-base transition-colors relative ${isActive ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-800'}`;
        btn.innerText = lesson.title;
        
        if (isActive) {
          const indicator = document.createElement('span');
          indicator.className = "absolute bottom-0 left-0 w-full h-1 bg-indigo-600 rounded-t-lg";
          btn.appendChild(indicator);
        }
        
        btn.addEventListener('click', () => {
          if (activeTabId !== lesson.id) {
            activeTabId = lesson.id;
            renderTabs();
            loadLesson(activeTabId);
          }
        });
        
        tabsContainer.appendChild(btn);
      });
    }

    function loadLesson(lessonId) {
      stopAllAudio();
      showAllAnswers = false;
      revealedAnswers.clear();
      updateToggleAnswersBtnUI();
      
      const lesson = lessons.find(l => l.id === lessonId);
      lessonTitle.innerText = lesson.title;
      
      renderDialogues();
    }

    function renderDialogues() {
      const lesson = lessons.find(l => l.id === activeTabId);
      dialoguesContainer.innerHTML = '';
      
      lesson.dialogues.forEach((dialogue, index) => {
        const div = document.createElement('div');
        div.id = `dialogue-${index}`;
        div.className = `mb-6 p-4 -mx-4 rounded-lg transition-colors duration-300 ${currentPlayingIndex === index ? 'bg-indigo-50 border-l-4 border-indigo-400' : 'border-l-4 border-transparent'}`;
        
        const p = document.createElement('p');
        p.className = "text-3xl md:text-4xl leading-[4.5rem] md:leading-[5rem] font-bold text-gray-900 tracking-wide";
        
        const linePlayBtn = document.createElement('button');
        linePlayBtn.innerHTML = SVGs.playFull;
        linePlayBtn.className = "inline-flex items-center justify-center w-10 h-10 mr-3 rounded-full bg-indigo-100 text-indigo-600 hover:bg-indigo-200 transition-colors align-middle focus:outline-none p-2.5";
        linePlayBtn.title = "このセリフを再生";
        linePlayBtn.onclick = () => playSingleLine(index);

        const speakerSpan = document.createElement('span');
        speakerSpan.className = "mr-4 inline-block min-w-[5rem] text-gray-800 align-middle";
        speakerSpan.innerText = `${dialogue.speaker}:`;
        
        p.appendChild(linePlayBtn);
        p.appendChild(speakerSpan);
        
        const textNodes = parseDictationText(dialogue.text, index);
        textNodes.forEach(node => p.appendChild(node));
        
        div.appendChild(p);
        dialoguesContainer.appendChild(div);
      });
    }

    function updateDialogueHighlight() {
      const lesson = lessons.find(l => l.id === activeTabId);
      lesson.dialogues.forEach((_, index) => {
        const el = document.getElementById(`dialogue-${index}`);
        if (el) {
          if (currentPlayingIndex === index) {
            el.className = "mb-6 p-4 -mx-4 rounded-lg transition-colors duration-300 bg-indigo-50 border-l-4 border-indigo-400";
            // スピーチに連動した自動スクロール
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          } else {
            el.className = "mb-6 p-4 -mx-4 rounded-lg transition-colors duration-300 border-l-4 border-transparent";
          }
        }
      });
    }

    function parseDictationText(text, dialogueIndex) {
      const parts = text.split(/(\{.*?\})/g);
      let blankCounter = 0;
      const nodes = [];

      parts.forEach((part, i) => {
        if (part.startsWith('{') && part.endsWith('}')) {
          const answer = part.slice(1, -1);
          const blankKey = `${activeTabId}-${dialogueIndex}-${blankCounter}`;
          blankCounter++;
          
          const isRevealed = showAllAnswers || revealedAnswers.has(blankKey);

          const wrapper = document.createElement('span');
          wrapper.className = "relative inline-block mx-1 align-baseline cursor-pointer group";
          wrapper.title = "クリックで解答を表示/非表示";
          
          const textSpan = document.createElement('span');
          textSpan.id = `blank-text-${blankKey}`;
          textSpan.className = `inline-block min-w-[5rem] px-2 text-center border-b-[3px] transition-all duration-200 ${isRevealed ? 'opacity-100 text-red-600 border-transparent' : 'opacity-0 text-transparent border-transparent'}`;
          textSpan.innerText = answer;
          
          const underline = document.createElement('span');
          underline.id = `blank-line-${blankKey}`;
          underline.className = `absolute bottom-0 left-0 right-0 h-[4px] group-hover:bg-indigo-500 transition-colors ${isRevealed ? 'hidden' : 'bg-gray-900'}`;
          
          wrapper.appendChild(textSpan);
          wrapper.appendChild(underline);
          
          wrapper.addEventListener('click', () => {
            toggleSingleAnswer(blankKey);
          });
          
          nodes.push(wrapper);
        } else {
          const span = document.createElement('span');
          span.innerText = part;
          nodes.push(span);
        }
      });
      return nodes;
    }

    // --- Voice Logic (Gender-based selection) ---
    function getVoiceForSpeaker(speakerName) {
      const profile = speakerProfiles[speakerName] || { gender: "female", pitch: 1.0 };
      
      voices = synth.getVoices();
      const enVoices = voices.filter(v => v.lang.startsWith('en'));
      if (enVoices.length === 0) return null;

      const maleKeywords = ['male', 'boy', 'guy', 'david', 'mark', 'alex', 'fred', 'daniel', 'aaron'];
      const femaleKeywords = ['female', 'girl', 'woman', 'zira', 'samantha', 'victoria', 'karen', 'tessa', 'moira', 'google us english'];

      const keywords = profile.gender === 'male' ? maleKeywords : femaleKeywords;
      const matchedVoices = enVoices.filter(v => keywords.some(kw => v.name.toLowerCase().includes(kw)));
      
      if (matchedVoices.length > 0) return matchedVoices[0];
      return enVoices[0]; 
    }

    function getPitchForSpeaker(speakerName) {
      const profile = speakerProfiles[speakerName] || { pitch: 1.0 };
      return profile.pitch;
    }

    // --- Helper function to sanitize text for TTS engine ---
    function getSanitizedText(text) {
      let cleanText = text.replace(/\{|\}/g, '');
      // TTSエンジンがクラッシュするのを防ぐため、連続したピリオドやドットを単一の句点に変換
      cleanText = cleanText.replace(/(\.\s*){2,}/g, '. '); 
      return cleanText;
    }

    // --- Logic & Event Handlers ---
    function setupEventListeners() {
      speedSelect.addEventListener('change', (e) => {
        playbackSpeed = parseFloat(e.target.value);
        if (recordAudio) recordAudio.playbackRate = playbackSpeed;
      });

      toggleAnswersBtn.addEventListener('click', () => {
        showAllAnswers = !showAllAnswers;
        if (!showAllAnswers) revealedAnswers.clear();
        updateToggleAnswersBtnUI();
        renderDialogues(); 
      });

      playAudioBtn.addEventListener('click', handleTogglePlayAll);
      recordBtn.addEventListener('click', handleToggleRecord);
      playRecordBtn.addEventListener('click', handlePlayRecord);
    }

    function toggleSingleAnswer(blankKey) {
      if (revealedAnswers.has(blankKey)) {
        revealedAnswers.delete(blankKey);
      } else {
        revealedAnswers.add(blankKey);
      }
      
      const isRevealed = showAllAnswers || revealedAnswers.has(blankKey);
      const textSpan = document.getElementById(`blank-text-${blankKey}`);
      const underline = document.getElementById(`blank-line-${blankKey}`);
      
      if (textSpan && underline) {
        textSpan.className = `inline-block min-w-[5rem] px-2 text-center border-b-[3px] transition-all duration-200 ${isRevealed ? 'opacity-100 text-red-600 border-transparent' : 'opacity-0 text-transparent border-transparent'}`;
        underline.className = `absolute bottom-0 left-0 right-0 h-[4px] group-hover:bg-indigo-500 transition-colors ${isRevealed ? 'hidden' : 'bg-gray-900'}`;
      }
    }

    function updateToggleAnswersBtnUI() {
      const icon = document.getElementById('answersIcon');
      const text = document.getElementById('answersText');
      
      if (showAllAnswers) {
        toggleAnswersBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors bg-amber-100 text-amber-800 border border-amber-300 min-w-[170px]";
        icon.innerHTML = SVGs.eyeOff;
        text.innerText = "Hide Answers";
      } else {
        toggleAnswersBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-200 min-w-[170px]";
        icon.innerHTML = SVGs.eye;
        text.innerText = "Show Answers";
      }
    }

    function updatePlayAudioBtnUI() {
      const iconContainer = document.getElementById('playIconContainer');
      const text = document.getElementById('playText');

      if (playState === 'playing') {
        playAudioBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-amber-100 text-amber-700 hover:bg-amber-200 border border-amber-200 min-w-[150px]";
        iconContainer.innerHTML = SVGs.pause;
        text.innerText = "Pause";
      } else if (playState === 'paused') {
        playAudioBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-indigo-600 text-white min-w-[150px]";
        iconContainer.innerHTML = SVGs.play;
        text.innerText = "Resume";
      } else {
        playAudioBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200 min-w-[150px]";
        iconContainer.innerHTML = SVGs.play;
        text.innerText = "Play All";
      }
    }

    // --- Record Actions ---
    function updateRecordBtnUI() {
      const iconContainer = document.getElementById('recordIconContainer');
      const text = document.getElementById('recordText');

      if (isRecording) {
        recordBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-red-600 text-white animate-pulse min-w-[150px]";
        iconContainer.innerHTML = SVGs.stop;
        text.innerText = "Recording...";
      } else {
        recordBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 min-w-[150px]";
        iconContainer.innerHTML = SVGs.mic;
        text.innerText = "Record";
      }
      
      if (recordUrl) {
        playRecordBtn.classList.remove('hidden');
      } else {
        playRecordBtn.classList.add('hidden');
      }
    }

    function updatePlayRecordBtnUI() {
      const iconContainer = document.getElementById('playRecordIconContainer');
      const text = document.getElementById('playRecordText');

      if (isPlayingRecord) {
        playRecordBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-emerald-600 text-white min-w-[170px]";
        iconContainer.innerHTML = SVGs.stop;
        text.innerText = "Stop Voice";
      } else {
        playRecordBtn.className = "flex justify-center items-center gap-2 px-5 py-2.5 rounded-lg text-base font-bold transition-colors shadow-sm bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 min-w-[170px]";
        iconContainer.innerHTML = SVGs.play;
        text.innerText = "Play My Voice";
      }
    }

    // --- Audio Functions ---
    function stopAllAudio() {
      playState = 'idle';
      isPlayingRef = false;
      currentPlayingIndex = -1;
      resumeIndex = 0;

      synth.resume(); // Chromeで一時停止したままスタックするバグの回避
      synth.cancel(); 
      keepAliveUtterances = []; 

      if (recordAudio) {
        recordAudio.pause();
        recordAudio.currentTime = 0;
        isPlayingRecord = false;
      }
      
      updatePlayAudioBtnUI();
      updatePlayRecordBtnUI();
      updateDialogueHighlight();
    }

    // --- セリフ毎の単発再生機能 ---
    function playSingleLine(index) {
      stopAllAudio(); 

      const lesson = lessons.find(l => l.id === activeTabId);
      const dialogue = lesson.dialogues[index];
      
      currentPlayingIndex = index;
      updateDialogueHighlight();

      const cleanText = getSanitizedText(dialogue.text);
      const utterThis = new SpeechSynthesisUtterance(cleanText);
      
      utterThis.lang = 'en-US';
      keepAliveUtterances.push(utterThis);
      
      const voice = getVoiceForSpeaker(dialogue.speaker);
      if(voice) utterThis.voice = voice;
      utterThis.pitch = getPitchForSpeaker(dialogue.speaker);
      utterThis.rate = playbackSpeed;
      
      utterThis.onend = function () {
        const idx = keepAliveUtterances.indexOf(utterThis);
        if (idx > -1) keepAliveUtterances.splice(idx, 1);
        currentPlayingIndex = -1;
        updateDialogueHighlight();
      };
      
      utterThis.onerror = function (event) {
        if (event.error !== 'canceled' && event.error !== 'interrupted') {
             console.error('SpeechSynthesisUtterance.onerror', event.error);
        }
        const idx = keepAliveUtterances.indexOf(utterThis);
        if (idx > -1) keepAliveUtterances.splice(idx, 1);
        currentPlayingIndex = -1;
        updateDialogueHighlight();
      };

      synth.speak(utterThis);
    }

    // --- 全体再生・一時停止・再開機能 ---
    async function handleTogglePlayAll() {
      const lesson = lessons.find(l => l.id === activeTabId);

      // --- Playing -> Paused ---
      if (playState === 'playing') {
        playState = 'paused';
        isPlayingRef = false;
        synth.resume(); // バグ回避
        synth.cancel(); 
        updatePlayAudioBtnUI();
        return;
      }

      // --- Idle / Paused -> Playing ---
      playState = 'playing';
      isPlayingRef = true;
      updatePlayAudioBtnUI();

      if (resumeIndex >= lesson.dialogues.length) {
        resumeIndex = 0;
      }
      
      let i = resumeIndex;
      while (i < lesson.dialogues.length && isPlayingRef) {
        currentPlayingIndex = i;
        resumeIndex = i; 
        updateDialogueHighlight();
        
        const dialogue = lesson.dialogues[i];
        
        await new Promise((resolve) => {
          const cleanText = getSanitizedText(dialogue.text);
          const utterThis = new SpeechSynthesisUtterance(cleanText);
          
          utterThis.lang = 'en-US';
          keepAliveUtterances.push(utterThis);
          
          const voice = getVoiceForSpeaker(dialogue.speaker);
          if(voice) utterThis.voice = voice;
          utterThis.pitch = getPitchForSpeaker(dialogue.speaker);
          utterThis.rate = playbackSpeed;
          
          utterThis.onend = function (event) {
            const idx = keepAliveUtterances.indexOf(utterThis);
            if (idx > -1) keepAliveUtterances.splice(idx, 1);
            resolve();
          };
          
          utterThis.onerror = function (event) {
            if (event.error !== 'canceled' && event.error !== 'interrupted' && isPlayingRef) {
                 console.error('SpeechSynthesisUtterance.onerror', event.error);
            }
            const idx = keepAliveUtterances.indexOf(utterThis);
            if (idx > -1) keepAliveUtterances.splice(idx, 1);
            resolve(); 
          }

          synth.speak(utterThis);
        });
        
        if (!isPlayingRef) break; 

        if (i < lesson.dialogues.length - 1 && isPlayingRef) {
          const currentSpeaker = dialogue.speaker;
          const nextSpeaker = lesson.dialogues[i + 1].speaker;
          const basePause = currentSpeaker === nextSpeaker ? 100 : 350;
          const speedAdjustedPause = basePause / playbackSpeed;
          
          const steps = speedAdjustedPause / 50;
          for(let s=0; s<steps; s++){
            if(!isPlayingRef) break;
            await sleep(50);
          }
        }
        
        if (isPlayingRef) {
           i++;
           resumeIndex = i; 
        }
      }

      if (isPlayingRef) {
        playState = 'idle';
        isPlayingRef = false;
        currentPlayingIndex = -1;
        resumeIndex = 0;
        updatePlayAudioBtnUI();
        updateDialogueHighlight();
      }
    }

    async function handleToggleRecord() {
      if (isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        updateRecordBtnUI();
      } else {
        stopAllAudio(); 
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          const chunks = [];
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' }); 
            recordUrl = URL.createObjectURL(blob);
            updateRecordBtnUI();
          };
          mediaRecorder.start();
          isRecording = true;
          updateRecordBtnUI();
        } catch (err) {
          console.error("Mic access denied or error.", err);
          alert("マイクへのアクセスが拒否されたか、エラーが発生しました。ブラウザの設定を確認してください。");
        }
      }
    }

    function handlePlayRecord() {
      if (!recordUrl) return;

      if (isPlayingRecord) {
        if (recordAudio) {
          recordAudio.pause();
          recordAudio.currentTime = 0;
        }
        isPlayingRecord = false;
        updatePlayRecordBtnUI();
        return;
      }

      stopAllAudio(); 
      recordAudio = new Audio(recordUrl);
      recordAudio.playbackRate = playbackSpeed; 
      recordAudio.onended = () => {
        isPlayingRecord = false;
        updatePlayRecordBtnUI();
      };
      recordAudio.play();
      isPlayingRecord = true;
      updatePlayRecordBtnUI();
    }

    // Initialize the app when DOM is loaded
    document.addEventListener('DOMContentLoaded', init);

  </script>
